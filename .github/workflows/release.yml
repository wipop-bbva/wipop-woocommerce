# TODO cache?
name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies and run tests
        run: |
          cd wipop
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi
          npm test --if-present
          npm run build
          cd ..
      - name: Package plugin
        run: |
          zip -r wipop.zip wipop \
            -x "wipop/src/*" \
            -x "wipop/node_modules/*" \
            -x "wipop/tests/*" \
            -x "wipop/.*"

      - name: Switch to Node 20 for Semantic Release
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
