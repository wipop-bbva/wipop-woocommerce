# TODO cache?
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read
  issues: write 
jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wipop
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies and run tests
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
              npm ci
            else
              npm install
            fi  
          npm test --if-present

      - name: Install PHP dependencies
        run: |
          rm -rf vendor
          composer install --no-dev --optimize-autoloader

          test ! -f vendor/composer/jetpack_autoload_filemap.php
          test ! -d vendor/jetpack-autoloader

      - name: Switch to Node 20 for Semantic Release
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
