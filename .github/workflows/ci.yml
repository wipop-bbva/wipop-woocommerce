name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  security:
    name: Composer Audit for prod deps
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer

      - name: Install prod deps
        run: composer install --no-dev --no-progress --prefer-dist --no-interaction
        working-directory: wipop

      - name: Audit composer.lock
        run: composer audit --no-dev --locked
        working-directory: wipop

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd wipop
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run unit tests
        run: |
          cd wipop
          npm test --if-present
